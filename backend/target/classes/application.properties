# ==============================
# Sangharsh K Library - Config
# ==============================

# Server Port
server.port=8080

# Allow frontend to access backend (CORS)
spring.mvc.cors.allowed-origins=*

# ==============================
# MySQL Database Configuration
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/sangharsh_library?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=Omkar
spring.datasource.password=Omkar
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate Configuration
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# JWT Configuration
# ==============================
app.jwt.secret=SangharshLibrarySecretKey2024GreaterNoidaUP!@#$%
app.jwt.expiration=86400000

# ==============================
# App Configuration
# ==============================
app.name=Sangharsh K Library
app.location=Greater Noida, Uttar Pradesh
