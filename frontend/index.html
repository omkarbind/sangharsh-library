<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sangharsh K Library – Login</title>
    <link rel="stylesheet" href="css/style.css"/>
    <style>
        .saffron-bar { height: 5px; background: linear-gradient(90deg, #e8821a, #d4a017, #e8821a); border-radius: 20px 20px 0 0; }
        .hero-badge { background: #fff4e6; color: #e8821a; font-size:0.78rem; font-weight:700; padding:4px 12px; border-radius:999px; display:inline-block; margin-bottom:10px; letter-spacing:0.05em; }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-box">
        <div class="saffron-bar"></div>
        <div class="auth-logo" style="margin-top:20px">
            <span class="hero-badge">📚 Greater Noida, UP</span>
            <span class="lib-name">Sangharsh K Library</span>
            <span class="lib-sub">Seat Booking System</span>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchTab('login')">Login</div>
            <div class="auth-tab" onclick="switchTab('register')">Register</div>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="auth-form active">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com"/>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="••••••••"/>
            </div>
            <button class="btn btn-saffron w-full" style="justify-content:center" onclick="doLogin()">
                Login →
            </button>
            <p class="text-muted text-center mt-4">
                Admin? Use <b>admin@sangharsh.com</b> / <b>admin123</b>
            </p>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="auth-form">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="regName" class="form-control" placeholder="Your full name"/>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="email@example.com"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="tel" id="regPhone" class="form-control" placeholder="10-digit number"/>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="regPassword" class="form-control" placeholder="Min 6 characters"/>
            </div>
            <button class="btn btn-primary w-full" style="justify-content:center" onclick="doRegister()">
                Create Account →
            </button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    // Redirect if already logged in
    if (isLoggedIn()) {
        window.location.href = isAdmin() ? 'pages/admin-dashboard.html' : 'pages/dashboard.html';
    }

    function switchTab(tab) {
        document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='login')||(i===1 && tab==='register')));
        document.getElementById('loginForm').classList.toggle('active', tab === 'login');
        document.getElementById('registerForm').classList.toggle('active', tab === 'register');
    }

    async function doLogin() {
        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { showToast('Please fill all fields', 'error'); return; }
        try {
            const data = await AuthAPI.login({ email, password });
            saveAuth(data);
            showToast('Welcome back, ' + data.fullName + '!', 'success');
            setTimeout(() => {
                window.location.href = data.role === 'ADMIN' ? 'pages/admin-dashboard.html' : 'pages/dashboard.html';
            }, 500);
        } catch(e) { showToast(e.message, 'error'); }
    }

    async function doRegister() {
        const fullName = document.getElementById('regName').value.trim();
        const email    = document.getElementById('regEmail').value.trim();
        const phone    = document.getElementById('regPhone').value.trim();
        const password = document.getElementById('regPassword').value;
        if (!fullName || !email || !password) { showToast('Please fill all required fields', 'error'); return; }
        try {
            const data = await AuthAPI.register({ fullName, email, password, phone });
            saveAuth(data);
            showToast('Account created! Welcome!', 'success');
            setTimeout(() => window.location.href = 'pages/dashboard.html', 500);
        } catch(e) { showToast(e.message, 'error'); }
    }

    // Allow Enter key
    document.addEventListener('keypress', e => { if(e.key==='Enter') { if(document.getElementById('loginForm').classList.contains('active')) doLogin(); else doRegister(); }});
</script>
</body>
</html>
